name: Keep Render Warm

on:
  schedule:
    - cron: "*/14 * * * *"  # every 14 minutes
  workflow_dispatch:         # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://voice-call-ai-agent.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: got $STATUS (service may be cold-starting) — not failing job"
          fi
